name: Bug report
description: Report a reproducible TuiBox defect
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not include subscription URLs, credentials, imported documents, access tokens, RPC payloads, or raw sing-box output. Report security vulnerabilities through SECURITY.md, not this form.
  - type: input
    id: version
    attributes:
      label: TuiBox version
      description: Paste the output of `tuibox version`.
      placeholder: "tuibox v0.1.0 (abcdef0)"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
    validations:
      required: true
  - type: dropdown
    id: architecture
    attributes:
      label: Architecture
      options:
        - amd64
        - arm64
    validations:
      required: true
  - type: dropdown
    id: interface
    attributes:
      label: Affected interface
      options:
        - TUI
        - CLI
        - Installer or uninstaller
        - Updater
        - Daemon or connection
        - Subscription parsing or refresh
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Use synthetic/redacted values. Include the exact command or key sequence.
      placeholder: |
        1. Run `tuibox ...`
        2. Select ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include only stable/redacted errors.
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: Redacted doctor output
      description: Paste `tuibox doctor` output after removing anything sensitive.
      render: json
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Do not attach live configs, state files, secret files, or credentials.
  - type: checkboxes
    id: checks
    attributes:
      label: Safety checks
      options:
        - label: I removed subscription URLs, credentials, tokens, personal data, and raw core/RPC payloads.
          required: true
        - label: This is not an undisclosed security vulnerability.
          required: true
