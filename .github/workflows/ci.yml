name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Quality and offline tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.0, source: https://github.com/actions/checkout
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0, source: https://github.com/actions/setup-go
        with:
          go-version-file: go.mod
          cache: true
      - name: Check formatting
        shell: bash
        run: |
          unformatted="$(gofmt -l .)"
          if [[ -n "$unformatted" ]]; then
            printf 'Unformatted Go files:\n%s\n' "$unformatted" >&2
            exit 1
          fi
      - name: Run offline tests
        run: go test ./...
      - name: Run race detector
        run: go test -race ./...
      - name: Run vet
        run: go vet ./...
      - name: Build both binaries
        run: go build ./cmd/tuibox ./cmd/tuiboxd
      - name: Check shell syntax
        run: sh -n install.sh uninstall.sh scripts/cross-build.sh scripts/packaging_test.sh
      - name: Test installer lifecycle
        run: ./scripts/packaging_test.sh

  cross-build:
    name: Cross-build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.0, source: https://github.com/actions/checkout
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0, source: https://github.com/actions/setup-go
        with:
          go-version-file: go.mod
          cache: true
      - name: Build both binaries without CGO
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -o "${RUNNER_TEMP}/tuibox-${GOOS}-${GOARCH}" ./cmd/tuibox
          go build -o "${RUNNER_TEMP}/tuiboxd-${GOOS}-${GOARCH}" ./cmd/tuiboxd

  pinned-core-integration:
    name: sing-box 1.13.14 integration
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.0, source: https://github.com/actions/checkout
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0, source: https://github.com/actions/setup-go
        with:
          go-version-file: go.mod
          cache: true
      - name: Validate generated configs with pinned core
        env:
          TUIBOX_CORE_INTEGRATION: "1"
        run: go test ./internal/core -count=1
